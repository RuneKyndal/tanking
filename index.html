<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HeliTimer v3.00</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 0; position: fixed; width: 100%; height: 100%; overflow: hidden; }
        .page { width: 100%; padding: 8px; display: none; height: 100vh; position: absolute; top: 0; left: 0; background: #fff; z-index: 10; }
        #calc-page { display: block; z-index: 20; overflow-y: auto; }

        /* --- Global Elements --- */
        h2 { text-align: center; margin: 4px 0 8px 0; font-size: 1.1rem; text-transform: uppercase; }
        button { font-weight: bold; border-radius: 6px; border: 2px solid #000; text-transform: uppercase; touch-action: manipulation; }
        .btn-nav { background: #000; color: #fff; padding: 12px; width: 100%; font-size: 1.1rem; border-radius: 10px; margin-top: 5px; }

        /* --- Page 1 Styles --- */
        .input-block { border: 2px solid #000; border-radius: 8px; margin-bottom: 8px; overflow: hidden; background: #fff; }
        .input-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #ddd; gap: 8px; }
        .input-label { font-size: 0.85rem; font-weight: bold; flex: 1; }
        input[type="number"] { background: #f5f5f5; border: 2px solid #000; border-radius: 6px; font-size: 1.1rem; font-weight: bold; padding: 5px; text-align: right; width: 100px; }
        .fuel-section { border: 2px solid #000; border-radius: 8px; padding: 10px; margin-bottom: 8px; background: #fff; }
        .fuel-big { font-size: 1.4rem; font-weight: bold; text-align: center; line-height: 1; }
        .result-section { border: 2px solid #000; border-radius: 8px; overflow: hidden; margin-bottom: 8px; background: #fff; text-align: center; }
        .result-title { background: #000; color: #fff; padding: 5px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; }
        .r-label { font-size: 0.65rem; color: #666; text-transform: uppercase; display: block; }
        .r-val { font-size: 2.2rem; font-weight: bold; display: block; }

        /* --- Page 2 Styles --- */
        .timer-row { display: flex; align-items: center; width: 100%; border: 2px solid #000; border-radius: 8px; margin-bottom: 6px; padding: 6px; gap: 5px; }
        .timer-name { font-size: 0.75rem; font-weight: bold; flex: 0 0 50px; text-transform: uppercase; }
        .time-display { flex: 0 0 80px; font-family: monospace; font-size: 1.1rem; font-weight: bold; text-align: right; }
        .btn-start { background: #0f0; flex: 2; height: 40px; }
        .btn-stop { background: #f00; color: #fff; flex: 2; height: 40px; }
        .btn-rst { background: #ccc; flex: 1; height: 40px; }
        .stat-box { background: #f0f0f0; padding: 6px; border: 2px solid #000; border-radius: 8px; text-align: center; }

        /* --- Page 3 Styles --- */
        .flight-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 4px; }
        .hdr-select { width: 100%; padding: 4px; font-weight: bold; font-size: 1.3rem; border: 2px solid #000; border-radius: 4px; text-align: center; }
        .btn-hdr { flex: 0 0 95px; height: 50px; font-size: 0.75rem; border: 2px solid #000; border-radius: 6px; }
        
        .bubble-v198 { border: 2px solid #000; border-radius: 10px; margin-bottom: 6px; background: #fff; padding: 6px; text-align: center; }
        .val-xl-v198 { font-size: 5rem; font-weight: bold; display: inline-block; line-height: 1; }
        .unit-xl { font-size: 2.5rem; font-weight: bold; margin-left: 5px; }

        .gauge-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; }
        .analog-svg { width: 100vw; height: auto; margin-left: -8px; margin-top: 5px; }

        .gs-container { display: flex; align-items: baseline; justify-content: center; margin-top: -15px; }
        .gs-unit { font-size: 1.2rem; font-weight: bold; color: #444; margin-left: 8px; }

        /* Helpers */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 16px; background: #ddd; border-radius: 10px; margin: 12px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 44px; height: 44px; background: #000; border-radius: 50%; border: 3px solid #fff; }
    </style>
</head>
<body>

<div id="calc-page" class="page">
    <h2>214ST W&amp;B</h2>
    <div class="input-block">
        <div class="input-row"><span class="input-label">Max Gross</span><input type="number" id="max-gross" value="17500" oninput="updateWB()"></div>
        <div class="input-row"><span class="input-label">A/C Empty Weight</span><input type="number" id="empty-weight" value="10000" oninput="updateWB()"></div>
        <div class="input-row"><span class="input-label">Crew + Gear</span><input type="number" id="crew-gear" value="400" oninput="updateWB()"></div>
        <div class="input-row" style="background:#f9f9f9;"><span class="input-label">Basic Aircraft</span><span id="basic-ac-display" style="font-weight:bold; font-size:1.1rem; padding-right:10px;">--</span></div>
    </div>
    <div class="fuel-section">
        <div class="fuel-big" id="fuel-display">Fuel 2,000 lbs</div>
        <input type="range" id="fuel-slider" min="500" max="3000" step="50" value="2000" oninput="updateWB()">
    </div>
    <div class="result-section">
        <div class="result-title">Weight Summary</div>
        <div style="font-size:0.8rem; font-weight:bold; padding:4px; text-transform:uppercase;">Useful Load</div>
        <div class="result-grid">
            <div class="result-item"><span class="r-label">lbs</span><span class="r-val" id="res-lbs">--</span></div>
            <div class="result-item" style="border-left:1px solid #ddd;"><span class="r-label">liters</span><span class="r-val" id="res-liters">--</span></div>
        </div>
    </div>
    <button class="btn-nav" style="background:#28a745;" onclick="showPage('timer-page')">GO START</button>
</div>

<div id="timer-page" class="page">
    <h2>FLIGHT TIMER</h2>
    <div class="timer-row">
        <div class="timer-name">Eng 1</div>
        <div style="flex:1; display:flex; gap:4px;">
            <button class="btn-start" id="e1-start" onclick="startT('e1')">START</button>
            <button class="btn-stop" id="e1-stop" onclick="stopT('e1')" disabled>STOP</button>
            <button class="btn-rst" onclick="resetRow('e1')">RST</button>
        </div>
        <div class="time-display" id="e1-disp">00:00:00</div>
    </div>
    <div class="timer-row">
        <div class="timer-name">Eng 2</div>
        <div style="flex:1; display:flex; gap:4px;">
            <button class="btn-start" id="e2-start" onclick="startT('e2')">START</button>
            <button class="btn-stop" id="e2-stop" onclick="stopT('e2')" disabled>STOP</button>
            <button class="btn-rst" onclick="resetRow('e2')">RST</button>
        </div>
        <div class="time-display" id="e2-disp">00:00:00</div>
    </div>
    <div class="timer-row" style="background:#eef;">
        <div class="timer-name">Flight</div>
        <div style="flex:1; display:flex; gap:4px;">
            <button class="btn-start" id="fl-start" onclick="startT('fl')">START</button>
            <button class="btn-stop" id="fl-stop" onclick="stopT('fl')" disabled>STOP</button>
            <button class="btn-rst" onclick="resetRow('fl')">RST</button>
        </div>
        <div class="time-display" id="fl-disp">00:00:00</div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:10px;">
        <button class="btn-rst" style="background:#444; color:#fff;" onclick="showPage('calc-page')">BACK</button>
        <button class="btn-rst" style="background:#007bff; color:#fff;" onclick="saveLog()">SAVE</button>
        <button class="btn-rst" style="background:#666; color:#fff;" onclick="showLog()">LOGS</button>
    </div>
    <button class="btn-nav" style="background:#008800; margin-top:15px;" onclick="initFlightPage()">GO FLY</button>
</div>

<div id="flight-page" class="page" style="flex-direction: column;">
    <div class="flight-hdr">
        <button id="gps-btn" class="btn-hdr" style="background:#f00; color:#fff;" onclick="toggleGPS()">GPS OFF</button>
        <div style="flex:0 0 85px; text-align:center;">
            <label style="font-size:0.8rem; font-weight:bold; display:block;">Burn</label>
            <select id="burn-rate-select" class="hdr-select">
                <option value="800" selected>800</option><option value="850">850</option><option value="900">900</option>
            </select>
        </div>
        <div style="flex:0 0 85px; text-align:center;">
            <label style="font-size:0.8rem; font-weight:bold; display:block;">GS</label>
            <select id="gs-target-select" onchange="updateGSUI()" class="hdr-select"></select>
        </div>
        <button class="btn-hdr" style="background:#d9534f; color:#fff;" onclick="showPage('timer-page')">STOP/BACK</button>
    </div>

    <div class="bubble-v198"><span id="flight-timer-main" style="font-family:monospace; font-size:2.2rem; font-weight:bold;">00:00:00</span></div>

    <div class="bubble-v198">
        <span class="r-label">Fuel Load</span>
        <span class="val-xl-v198" id="fly-fuel-lbs">--</span><span class="unit-xl">Lbs</span>
        <input type="range" id="fly-fuel-slider" min="500" max="3000" step="50" oninput="curFuel=parseFloat(this.value)">
    </div>

    <div class="bubble-v198">
        <span class="r-label">Payload</span>
        <span class="val-xl-v198" id="fly-ltr">--</span><span class="unit-xl">L</span>
    </div>

    <div class="gauge-area">
        <svg class="analog-svg" viewBox="0 0 200 110">
            <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#ffeb3b" stroke-width="16" stroke-linecap="round"/>
            <path d="M 73 24 A 80 80 0 0 1 127 24" fill="none" stroke="#4caf50" stroke-width="16" />
            
            <text x="32" y="85" font-size="8" font-weight="bold" id="gs-min-val" fill="#000" text-anchor="middle">--</text>
            <text x="100" y="32" font-size="9" font-weight="bold" id="gs-tgt-val" fill="#000" text-anchor="middle">--</text>
            <text x="168" y="85" font-size="8" font-weight="bold" id="gs-max-val" fill="#000" text-anchor="middle">--</text>
            
            <line id="needle-ptr" x1="100" y1="100" x2="100" y2="12" stroke="#f00" stroke-width="4" stroke-linecap="round" />
            <circle cx="100" cy="100" r="7" fill="#000" />
        </svg>
        <div class="gs-container">
            <span id="fly-gs" style="font-size:5.5rem; font-weight:bold; line-height:1;">0</span>
            <span class="gs-unit">KTS GS</span>
        </div>
    </div>
</div>

<div id="log-page" class="page">
    <button class="btn-nav" onclick="showPage('timer-page')">BACK</button>
    <div id="log-content" style="margin-top:10px; font-size:0.8rem;"></div>
</div>

<script>
    let timers = {
        e1: { elapsed:0, start:null, interval:null, running:false },
        e2: { elapsed:0, start:null, interval:null, running:false },
        fl: { elapsed:0, start:null, interval:null, running:false, tsS:null, tsE:null },
        engG: { start:null, end:null }
    };
    let curFuel = 2000, burnRef = null, flyTick = null, curGS = 0, watchID = null;

    function showPage(id) {
        cancelAnimationFrame(flyTick);
        document.querySelectorAll('.page').forEach(p => {
            p.style.display = 'none';
            p.style.zIndex = '10';
        });
        const target = document.getElementById(id);
        target.style.display = (id === 'flight-page') ? 'flex' : 'block';
        target.style.zIndex = '20';
        window.scrollTo(0,0);
    }

    function updateWB() {
        let mg = parseFloat(document.getElementById('max-gross').value) || 0;
        let empty = parseFloat(document.getElementById('empty-weight').value) || 0;
        let crew = parseFloat(document.getElementById('crew-gear').value) || 0;
        let basic = empty + crew;
        document.getElementById('basic-ac-display').innerText = basic.toLocaleString() + ' lbs';
        curFuel = parseFloat(document.getElementById('fuel-slider').value);
        let p = mg - (basic + curFuel);
        document.getElementById('fuel-display').innerText = 'Fuel ' + curFuel.toLocaleString() + ' lbs';
        document.getElementById('res-lbs').innerText = p < 0 ? "OVER" : p.toLocaleString();
        document.getElementById('res-liters').innerText = p < 0 ? "--" : Math.round(p * 0.4536).toLocaleString();
    }

    function startT(id) {
        if (timers[id].running) return;
        timers[id].running = true; timers[id].start = Date.now() - timers[id].elapsed;
        timers[id].interval = setInterval(() => {
            timers[id].elapsed = Date.now() - timers[id].start;
            document.getElementById(id + '-disp').innerText = fmtHms(timers[id].elapsed);
        }, 1000);
        document.getElementById(id + '-start').disabled = true;
        document.getElementById(id + '-stop').disabled = false;
    }

    function stopT(id) {
        timers[id].running = false; clearInterval(timers[id].interval);
        document.getElementById(id + '-start').disabled = false;
        document.getElementById(id + '-stop').disabled = true;
    }

    function resetRow(id) { stopT(id); timers[id].elapsed = 0; document.getElementById(id + '-disp').innerText = "00:00:00"; }
    function fmtHms(ms) {
        let s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
        return [h,m,sec].map(v => v.toString().padStart(2,'0')).join(':');
    }

    function initFlightPage() {
        if (!timers.fl.running) startT('fl');
        showPage('flight-page');
        if (!watchID) toggleGPS(); 
        document.getElementById('fly-fuel-slider').value = curFuel;
        burnRef = Date.now();
        function loop() {
            let now = Date.now();
            let rate = parseFloat(document.getElementById('burn-rate-select').value);
            curFuel -= ((now - burnRef) / 3600000) * rate;
            burnRef = now;
            let mg = parseFloat(document.getElementById('max-gross').value);
            let basic = parseFloat(document.getElementById('empty-weight').value) + parseFloat(document.getElementById('crew-gear').value);
            let ltr = Math.round((mg - (basic + curFuel)) * 0.4536);
            document.getElementById('fly-ltr').innerText = ltr < 0 ? "0" : ltr.toLocaleString();
            document.getElementById('fly-fuel-lbs').innerText = Math.round(curFuel).toLocaleString();
            document.getElementById('flight-timer-main').innerText = fmtHms(timers.fl.elapsed);
            updateGSUI();
            flyTick = requestAnimationFrame(loop);
        }
        flyTick = requestAnimationFrame(loop);
    }

    function updateGSUI() {
        let tgt = parseFloat(document.getElementById('gs-target-select').value);
        document.getElementById('gs-min-val').textContent = tgt - 10;
        document.getElementById('gs-tgt-val').textContent = tgt;
        document.getElementById('gs-max-val').textContent = tgt + 10;
        document.getElementById('fly-gs').innerText = Math.round(curGS);
        let rotation = (curGS - tgt) * 9; 
        rotation = Math.max(-95, Math.min(95, rotation)); 
        document.getElementById('needle-ptr').setAttribute('transform', `rotate(${rotation}, 100, 100)`);
    }

    function toggleGPS() {
        let btn = document.getElementById('gps-btn');
        if (watchID) {
            navigator.geolocation.clearWatch(watchID); watchID = null;
            btn.innerText = "GPS OFF"; btn.style.background = "#f00";
        } else {
            watchID = navigator.geolocation.watchPosition(p => {
                curGS = (p.coords.speed || 0) * 1.94384;
                btn.innerText = "GPS LIVE"; btn.style.background = "#0f0";
            }, null, { enableHighAccuracy: true });
        }
    }

    const gsS = document.getElementById('gs-target-select');
    for(let i=0; i<=30; i++) { 
        let o = document.createElement('option'); o.value = i; o.innerText = i; 
        if(i===18) o.selected=true; 
        gsS.appendChild(o); 
    }
    updateWB();
</script>
</body>
</html>
