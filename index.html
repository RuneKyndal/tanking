<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>HeliTimer v2.10</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #fff; color: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page { width: 100%; padding: 12px 10px 30px 10px; display: none; }
        #calc-page { display: block; }
        
        /* --- Global UI --- */
        h2 { text-align: center; margin: 4px 0 12px 0; font-size: 1.2rem; }
        .input-block { border: 2px solid #000; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: #fff; }
        .input-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #ddd; }
        input[type="number"] { background: #f5f5f5; border: 2px solid #000; border-radius: 6px; font-size: 1.1rem; font-weight: bold; padding: 6px; text-align: right; width: 100px; }
        
        /* --- Page 3 Specifics --- */
        .header-strip { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 5px; }
        .controls-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 10px; border: 1px solid #000; }
        .sel-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .sel-group label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        select { padding: 8px; font-weight: bold; border: 2px solid #000; border-radius: 6px; background: #fff; }

        .full-bubble { border: 2px solid #000; border-radius: 12px; margin-bottom: 12px; background: #fff; padding: 15px; text-align: center; position: relative; }
        .label-sm { font-size: 0.8rem; font-weight: bold; color: #666; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .val-lg { font-size: 3.2rem; font-weight: bold; display: block; line-height: 1; letter-spacing: -1px; }
        
        /* --- GS Deviation Gauge --- */
        .gauge-container { position: relative; width: 100%; height: 40px; background: #eee; border: 2px solid #000; border-radius: 4px; margin: 10px 0 25px 0; overflow: visible; }
        .zone { position: absolute; height: 100%; top: 0; }
        .zone-yellow { background: #ffeb3b; width: 100%; left: 0; }
        .zone-green { background: #4caf50; width: 30%; left: 35%; border-left: 1px solid rgba(0,0,0,0.2); border-right: 1px solid rgba(0,0,0,0.2); }
        .center-line { position: absolute; left: 50%; height: 110%; width: 2px; background: #000; top: -5%; z-index: 2; }
        .needle { position: absolute; top: -5%; width: 6px; height: 110%; background: #cc0000; transform: translateX(-50%); transition: left 0.1s linear; z-index: 3; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        
        .gauge-labels { position: absolute; width: 100%; top: 42px; display: flex; justify-content: space-between; font-weight: bold; font-family: monospace; font-size: 0.9rem; padding: 0 2px; }
        .target-val { position: absolute; left: 50%; transform: translateX(-50%); top: 42px; font-size: 1.1rem; font-weight: bold; color: #000; }

        .btn-go { width: 100%; background: #000; color: #fff; padding: 20px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; border: none; }
        .btn-nav { background: #444; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; }
        .btn-gps { background: #007bff; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: bold; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 15px; background: #ddd; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 40px; height: 40px; background: #000; border-radius: 50%; }
    </style>
</head>
<body>

<div id="calc-page" class="page">
    <h2>214ST W&B</h2>
    <div class="input-block">
        <div class="input-row"><span>Max Gross</span><input type="number" id="max-gross" value="17500" oninput="updateWB()"></div>
        <div class="input-row"><span>Empty Wt</span><input type="number" id="empty-weight" value="10000" oninput="updateWB()"></div>
        <div class="input-row"><span>Crew/Gear</span><input type="number" id="crew-gear" value="400" oninput="updateWB()"></div>
    </div>
    <div class="full-bubble" style="padding:10px;">
        <span id="fuel-display">Fuel 2,000 lbs</span>
        <input type="range" id="fuel-slider" min="500" max="3000" step="50" value="2000" oninput="updateWB()">
    </div>
    <button class="btn-go" onclick="showPage('timer-page')">GO START</button>
</div>

<div id="timer-page" class="page">
    <div class="header-strip">
        <button class="btn-nav" onclick="showPage('calc-page')">BACK</button>
        <h2>TIMERS</h2>
        <div style="width:50px"></div>
    </div>
    <div style="text-align:center; padding:20px; border:2px dashed #ccc; margin-bottom:20px;">
        [Timer logic active in background]
    </div>
    <button class="btn-go" style="background:#008800;" onclick="initFlightPage()">GO FLY</button>
</div>

<div id="flight-page" class="page">
    <div class="header-strip">
        <button class="btn-nav" onclick="showPage('timer-page')">BACK</button>
        <button class="btn-gps" id="gps-btn" onclick="toggleGPS()">CONNECT GPS</button>
        <button class="btn-nav" style="background:#cc0000;" onclick="showPage('timer-page')">STOP</button>
    </div>

    <div class="controls-row">
        <div class="sel-group">
            <label>Fuel Burn</label>
            <select id="burn-rate-select">
                <option value="600">600</option><option value="700">700</option><option value="800" selected>800</option><option value="900">900</option>
            </select>
        </div>
        <div class="sel-group">
            <label>Target GS</label>
            <select id="target-gs-select" onchange="updateGSUI()">
                <option value="10">10</option><option value="15">15</option><option value="20" selected>20</option><option value="25">25</option><option value="30">30</option>
            </select>
        </div>
    </div>

    <div class="full-bubble">
        <span class="label-sm">Payload Liters</span>
        <span class="val-lg" id="fly-ltr">-- Ltr</span>
    </div>

    <div class="full-bubble">
        <span class="label-sm">Ground Speed (KTS)</span>
        <span class="val-lg" id="fly-gs">0 KTS</span>
        
        <div class="gauge-container">
            <div class="zone zone-yellow"></div>
            <div class="zone zone-green"></div>
            <div class="center-line"></div>
            <div id="gs-needle" class="needle" style="left: 50%;"></div>
            
            <div class="gauge-labels">
                <span id="low-label">-10</span>
                <span id="high-label">+10</span>
            </div>
            <div class="target-val" id="ideal-label">20</div>
        </div>
    </div>

    <div class="full-bubble">
        <span class="label-sm">Adjust Fuel Load</span>
        <input type="range" id="fly-fuel-slider" min="500" max="3000" step="50" oninput="manualFuelAdj(this.value)">
    </div>
</div>

<script>
    var currentFuel = 2000;
    var burnRefTime = null;
    var burnTimer = null;
    var watchID = null;
    var currentGS = 0;

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id !== 'flight-page') clearInterval(burnTimer);
    }

    function updateWB() {
        var fuel = document.getElementById('fuel-slider').value;
        currentFuel = parseFloat(fuel);
        document.getElementById('fuel-display').textContent = 'Fuel ' + fuel.toLocaleString() + ' lbs';
    }

    function initFlightPage() {
        showPage('flight-page');
        burnRefTime = Date.now();
        updateGSUI();
        burnTimer = setInterval(tick, 200); // Fast refresh for calculations
    }

    function tick() {
        // Burn Calculation
        var now = Date.now();
        var rate = parseFloat(document.getElementById('burn-rate-select').value);
        var elapsed = (now - burnRefTime) / 3600000;
        currentFuel = Math.max(0, currentFuel - (elapsed * rate));
        burnRefTime = now;
        
        // Update Liter Readout
        var mg = parseFloat(document.getElementById('max-gross').value);
        var basic = parseFloat(document.getElementById('empty-weight').value) + parseFloat(document.getElementById('crew-gear').value);
        var payloadLbs = mg - (basic + currentFuel);
        var liters = Math.round(payloadLbs * 0.4536);
        document.getElementById('fly-ltr').textContent = (payloadLbs < 0 ? "OVER" : liters.toLocaleString()) + " Ltr";
        
        updateGSUI();
    }

    function updateGSUI() {
        var target = parseFloat(document.getElementById('target-gs-select').value);
        document.getElementById('fly-gs').textContent = Math.round(currentGS) + " KTS";
        document.getElementById('ideal-label').textContent = target;
        document.getElementById('low-label').textContent = target - 10;
        document.getElementById('high-label').textContent = target + 10;

        // Calculate needle position
        // Deviation range is +/- 10 kts. 50% is center. 
        var diff = currentGS - target;
        var percent = 50 + (diff * 5); // 5% per knot
        percent = Math.max(0, Math.min(100, percent));
        document.getElementById('gs-needle').style.left = percent + "%";
    }

    function toggleGPS() {
        var btn = document.getElementById('gps-btn');
        if (watchID) {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.textContent = "CONNECT GPS";
            btn.style.background = "#007bff";
        } else {
            btn.textContent = "SEARCHING...";
            watchID = navigator.geolocation.watchPosition(pos => {
                btn.textContent = "GPS LIVE";
                btn.style.background = "#008800";
                currentGS = (pos.coords.speed || 0) * 1.94384; // m/s to knots
            }, err => { alert("GPS Access Denied"); watchID = null; }, 
            { enableHighAccuracy: true, maximumAge: 0 });
        }
    }

    function manualFuelAdj(val) {
        currentFuel = parseFloat(val);
        burnRefTime = Date.now();
    }
</script>
</body>
</html>
