<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HeliTimer v2.5</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 0; position: fixed; width: 100%; height: 100%; overflow: hidden; }
        .page { width: 100%; padding: 10px; display: none; height: 100vh; position: absolute; top: 0; left: 0; background: #fff; z-index: 10; overflow-y: auto; }
        #calc-page { display: block; z-index: 20; }

        h2 { text-align: center; margin: 4px 0 8px 0; font-size: 1.1rem; text-transform: uppercase; }
        button { font-weight: bold; border-radius: 6px; border: 2px solid #000; text-transform: uppercase; touch-action: manipulation; }
        .btn-nav { background: #000; color: #fff; padding: 14px; width: 100%; font-size: 1.2rem; border-radius: 10px; margin-top: 10px; }

        .input-block { border: 2px solid #000; border-radius: 8px; margin-bottom: 8px; overflow: hidden; background: #fff; }
        .input-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid #ddd; }
        input[type="number"] { background: #f5f5f5; border: 2px solid #000; border-radius: 4px; font-size: 1.1rem; font-weight: bold; padding: 4px; text-align: right; width: 90px; }
        
        .fuel-section { border: 2px solid #000; border-radius: 8px; padding: 15px; margin-bottom: 8px; background: #fff; }
        .fuel-big-p1 { font-size: 2.8rem; font-weight: bold; text-align: center; line-height: 1; margin-bottom: 20px; }
        .result-section { border: 2px solid #000; border-radius: 8px; overflow: hidden; margin-bottom: 8px; text-align: center; }
        .r-val { font-size: 2.2rem; font-weight: bold; }

        .timer-row { display: flex; align-items: center; border: 2px solid #000; border-radius: 8px; margin-bottom: 6px; padding: 6px; gap: 5px; }
        .time-display { flex: 0 0 85px; font-family: monospace; font-size: 1.1rem; font-weight: bold; text-align: right; }
        .timer-label { font-size: 0.6rem; font-weight: bold; width: 55px; text-transform: uppercase; line-height: 1; }
        
        .val-xl-v198 { font-size: 5rem; font-weight: bold; display: inline-block; line-height: 1; }
        .unit-xl { font-size: 2.5rem; font-weight: bold; margin-left: 5px; }
        .bubble-v198 { border: 2px solid #000; border-radius: 10px; margin-bottom: 6px; padding: 8px; text-align: center; background: #fff; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 20px; background: #ddd; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 44px; height: 44px; background: #000; border-radius: 50%; border: 3px solid #fff; }

        /* Log Styling */
        .log-item { border: 2px solid #000; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-family: monospace; background: #f9f9f9; }
        .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="calc-page" class="page">
    <h2>214ST W&amp;B v2.5</h2>
    <div class="input-block">
        <div class="input-row"><span>Max Gross</span><input type="number" id="max-gross" value="17500" oninput="updateWB()"></div>
        <div class="input-row"><span>A/C Empty</span><input type="number" id="empty-weight" value="10000" oninput="updateWB()"></div>
        <div class="input-row"><span>Crew + Gear</span><input type="number" id="crew-gear" value="400" oninput="updateWB()"></div>
    </div>
    <div class="fuel-section">
        <div class="fuel-big-p1" id="fuel-display">2,000 lbs</div>
        <input type="range" id="fuel-slider" min="500" max="3000" step="50" value="2000" oninput="updateWB()">
    </div>
    <div class="result-section">
        <div style="background:#000; color:#fff; padding:4px; font-size:0.8rem;">USEFUL PAYLOAD</div>
        <div style="display:grid; grid-template-columns:1fr 1fr;">
            <div><small>LBS</small><div class="r-val" id="res-lbs">--</div></div>
            <div style="border-left:1px solid #ddd;"><small>LITERS</small><div class="r-val" id="res-liters">--</div></div>
        </div>
    </div>
    <button class="btn-nav" style="background:#28a745;" onclick="showPage('timer-page')">GO START</button>
</div>

<div id="timer-page" class="page">
    <h2>FLIGHT TIMER</h2>
    <div class="timer-row"><span class="timer-label">Engine 1</span><button style="background:#0f0; flex:1; height:40px;" id="e1-start" onclick="startT('e1')">START</button><button style="background:#f00; color:#fff; flex:1; height:40px;" id="e1-stop" onclick="stopT('e1')" disabled>STOP</button><div class="time-display" id="e1-disp">00:00:00</div></div>
    <div class="timer-row"><span class="timer-label">Engine 2</span><button style="background:#0f0; flex:1; height:40px;" id="e2-start" onclick="startT('e2')">START</button><button style="background:#f00; color:#fff; flex:1; height:40px;" id="e2-stop" onclick="stopT('e2')" disabled>STOP</button><div class="time-display" id="e2-disp">00:00:00</div></div>
    <div class="timer-row" style="background:#eef;"><span class="timer-label">Flight Timer</span><button style="background:#0f0; flex:1; height:40px;" id="fl-start" onclick="startT('fl')">START</button><button style="background:#f00; color:#fff; flex:1; height:40px;" id="fl-stop" onclick="stopT('fl')" disabled>STOP</button><div class="time-display" id="fl-disp">00:00:00</div></div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:10px;">
        <div class="bubble-v198" style="background:#f0f0f0;"><small>ENG RUN</small><br><span id="e-ts" style="font-size:0.7rem;">--:-- to --:--</span><span class="total-hms" id="e-hms" style="display:block; border-top:1px solid #999; margin-top:4px;">00:00:00</span></div>
        <div class="bubble-v198" style="background:#eef;"><small>FLIGHT</small><br><span id="f-ts" style="font-size:0.7rem;">--:-- to --:--</span><span class="total-hms" id="f-hms" style="display:block; border-top:1px solid #999; margin-top:4px;">00:00:00</span></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:10px;">
        <button style="background:#444; color:#fff; padding:10px;" onclick="showPage('calc-page')">BACK</button>
        <button style="background:#007bff; color:#fff;" onclick="saveLog()">SAVE</button>
        <button style="background:#666; color:#fff;" onclick="showLog()">LOGS</button>
    </div>
    <button class="btn-nav" style="background:#008800;" onclick="initFlightPage()">GO FLY</button>
</div>

<div id="flight-page" class="page" style="flex-direction: column;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
        <button style="background:#d9534f; color:#fff; height:50px; flex:0 0 90px;" onclick="showPage('timer-page')">BACK</button>
        <div style="text-align:center;"><label style="font-size:0.7rem; font-weight:bold;">BURN</label><select id="burn-rate-select" style="font-size:1.2rem; display:block; border:2px solid #000; border-radius:4px;"><option value="800" selected>800</option><option value="850">850</option><option value="900">900</option></select></div>
        <div style="text-align:center;"><label style="font-size:0.7rem; font-weight:bold;">GS</label><select id="gs-target-select" onchange="updateGSUI()" style="font-size:1.2rem; display:block; border:2px solid #000; border-radius:4px;"></select></div>
        <button id="gps-btn" style="background:#f00; color:#fff; height:50px; flex:0 0 90px;" onclick="toggleGPS()">GPS OFF</button>
    </div>

    <div class="bubble-v198" style="padding:4px;"><span id="flight-timer-main" style="font-family:monospace; font-size:2.4rem; font-weight:bold;">00:00:00</span></div>

    <div class="bubble-v198">
        <small>FUEL LOAD</small><br>
        <span class="val-xl-v198" id="fly-fuel-lbs">--</span><span class="unit-xl">Lbs</span>
        <div style="height:20px;"></div> <input type="range" id="fly-fuel-slider" min="500" max="3000" step="50" oninput="curFuel=parseFloat(this.value)">
    </div>

    <div class="bubble-v198"><small>PAYLOAD</small><br><span class="val-xl-v198" id="fly-ltr">--</span><span class="unit-xl">L</span></div>

    <div style="flex:1; display:flex; flex-direction:column; align-items:center;">
        <svg viewBox="0 0 200 110" style="width:100vw; margin-left:-10px;">
            <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#ffeb3b" stroke-width="18" stroke-linecap="round"/>
            <path d="M 73 24 A 80 80 0 0 1 127 24" fill="none" stroke="#4caf50" stroke-width="18" />
            <text x="100" y="24" font-size="10" font-weight="bold" id="gs-tgt-val" text-anchor="middle">--</text>
            <text x="28" y="105" font-size="8" font-weight="bold" id="gs-min-val" text-anchor="middle">--</text>
            <text x="172" y="105" font-size="8" font-weight="bold" id="gs-max-val" text-anchor="middle">--</text>
            <line id="needle-ptr" x1="100" y1="100" x2="100" y2="8" stroke="#f00" stroke-width="4" stroke-linecap="round" />
            <circle cx="100" cy="100" r="7" fill="#000" />
        </svg>
        <div style="display: flex; align-items: baseline; justify-content: center; width: 100%; margin-top: -10px;">
            <span id="fly-gs" style="font-size:5.5rem; font-weight:bold; line-height:1;">0</span>
            <span style="font-size:1.2rem; font-weight:bold; color:#444; margin-left:10px;">KTS</span>
        </div>
    </div>
</div>

<div id="log-page" class="page">
    <h2>FLIGHT HISTORY</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
        <button style="background:#28a745; color:#fff; padding:12px;" onclick="downloadCSV()">DOWNLOAD CSV</button>
        <button style="background:#000; color:#fff; padding:12px;" onclick="showPage('timer-page')">BACK</button>
    </div>
    <div id="log-body"></div>
    <button class="btn-nav" style="background:#d9534f; margin-top:20px;" onclick="clearLogs()">CLEAR ALL HISTORY</button>
</div>

<script>
    let timers = {
        e1: { elapsed:0, start:null, interval:null, running:false },
        e2: { elapsed:0, start:null, interval:null, running:false },
        fl: { elapsed:0, start:null, interval:null, running:false, tsS:null, tsE:null },
        engG: { start:null, end:null }
    };
    let curFuel = 2000, burnRef = null, flyTick = null, curGS = 0, watchID = null;

    function showPage(id) {
        cancelAnimationFrame(flyTick);
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = (id === 'flight-page') ? 'flex' : 'block';
    }

    function updateWB() {
        let mg = parseFloat(document.getElementById('max-gross').value) || 0;
        let empty = parseFloat(document.getElementById('empty-weight').value) || 0;
        let crew = parseFloat(document.getElementById('crew-gear').value) || 0;
        curFuel = parseFloat(document.getElementById('fuel-slider').value);
        let basic = empty + crew;
        let p = mg - (basic + curFuel);
        document.getElementById('fuel-display').innerText = curFuel.toLocaleString() + ' lbs';
        document.getElementById('res-lbs').innerText = p < 0 ? "OVER" : p.toLocaleString();
        document.getElementById('res-liters').innerText = p < 0 ? "0" : Math.round(p * 0.4536).toLocaleString();
    }

    function startT(id) {
        if (timers[id].running) return;
        timers[id].running = true; timers[id].start = Date.now() - timers[id].elapsed;
        if (id === 'fl' && !timers.fl.tsS) timers.fl.tsS = new Date().toTimeString().slice(0,5);
        if ((id === 'e1' || id === 'e2') && !timers.engG.start) timers.engG.start = Date.now();
        timers[id].interval = setInterval(() => {
            timers[id].elapsed = Date.now() - timers[id].start;
            document.getElementById(id + '-disp').innerText = fmtHms(timers[id].elapsed);
            updateStats();
        }, 1000);
        document.getElementById(id + '-start').disabled = true;
        document.getElementById(id + '-stop').disabled = false;
    }

    function stopT(id) {
        timers[id].running = false; clearInterval(timers[id].interval);
        if (id === 'fl') timers.fl.tsE = new Date().toTimeString().slice(0,5);
        if (!timers.e1.running && !timers.e2.running) timers.engG.end = Date.now();
        document.getElementById(id + '-start').disabled = false;
        document.getElementById(id + '-stop').disabled = true;
        updateStats();
    }

    function updateStats() {
        let eMs = (timers.engG.end || (timers.engG.start ? Date.now() : 0)) - (timers.engG.start || 0);
        document.getElementById('e-hms').innerText = fmtHms(Math.max(0, eMs));
        document.getElementById('e-ts').innerText = (timers.engG.start ? new Date(timers.engG.start).toTimeString().slice(0,5) : "--:--") + " to " + (timers.engG.end ? new Date(timers.engG.end).toTimeString().slice(0,5) : "--:--");
        document.getElementById('f-hms').innerText = fmtHms(timers.fl.elapsed);
        document.getElementById('f-ts').innerText = (timers.fl.tsS || "--:--") + " to " + (timers.fl.tsE || "--:--");
    }

    function fmtHms(ms) {
        let s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
        return [h,m,sec].map(v => v.toString().padStart(2,'0')).join(':');
    }

    function saveLog() {
        let log = JSON.parse(localStorage.getItem('heliLogs') || '[]');
        let entry = {
            date: new Date().toLocaleDateString(),
            fuel: Math.round(curFuel),
            payload: document.getElementById('res-lbs').innerText,
            eng: document.getElementById('e-hms').innerText,
            flt: document.getElementById('f-hms').innerText,
            window: document.getElementById('f-ts').innerText
        };
        log.unshift(entry);
        localStorage.setItem('heliLogs', JSON.stringify(log));
        alert("Flight Saved to History");
    }

    function showLog() {
        let log = JSON.parse(localStorage.getItem('heliLogs') || '[]');
        let html = log.length ? '' : '<p style="text-align:center;">No flights recorded.</p>';
        log.forEach(e => {
            html += `<div class="log-item">
                <div style="border-bottom:1px solid #ccc; padding-bottom:3px; margin-bottom:5px;"><b>${e.date}</b> <span style="float:right;">${e.window}</span></div>
                <div class="log-grid">
                    <div>ENG: <b>${e.eng}</b></div><div>FLT: <b>${e.flt}</b></div>
                    <div>FUEL: <b>${e.fuel} lb</b></div><div>PAY: <b>${e.payload} lb</b></div>
                </div>
            </div>`;
        });
        document.getElementById('log-body').innerHTML = html;
        showPage('log-page');
    }

    function downloadCSV() {
        let log = JSON.parse(localStorage.getItem('heliLogs') || '[]');
        if(!log.length) return alert("No data to download");
        let csv = "Date,Time Window,Engine Time,Flight Time,Fuel(lbs),Payload(lbs)\n";
        log.forEach(e => {
            csv += `"${e.date}","${e.window}","${e.eng}","${e.flt}","${e.fuel}","${e.payload}"\n`;
        });
        let blob = new Blob([csv], { type: 'text/csv' });
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `HeliTimer_Log_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
    }

    function clearLogs() { if(confirm("Permanently clear all logs?")) { localStorage.removeItem('heliLogs'); showLog(); } }

    function initFlightPage() {
        if (!timers.fl.running) startT('fl');
        showPage('flight-page');
        document.getElementById('fly-fuel-slider').value = curFuel;
        burnRef = Date.now();
        function loop() {
            let now = Date.now();
            let rate = parseFloat(document.getElementById('burn-rate-select').value);
            curFuel -= ((now - burnRef) / 3600000) * rate;
            burnRef = now;
            let mg = parseFloat(document.getElementById('max-gross').value);
            let basic = parseFloat(document.getElementById('empty-weight').value) + parseFloat(document.getElementById('crew-gear').value);
            let p = mg - (basic + curFuel);
            document.getElementById('fly-ltr').innerText = p < 0 ? "0" : Math.round(p * 0.4536).toLocaleString();
            document.getElementById('fly-fuel-lbs').innerText = Math.round(curFuel).toLocaleString();
            document.getElementById('flight-timer-main').innerText = fmtHms(timers.fl.elapsed);
            updateGSUI();
            flyTick = requestAnimationFrame(loop);
        }
        flyTick = requestAnimationFrame(loop);
    }

    function updateGSUI() {
        let tgt = parseFloat(document.getElementById('gs-target-select').value);
        document.getElementById('gs-min-val').textContent = tgt - 10;
        document.getElementById('gs-tgt-val').textContent = tgt;
        document.getElementById('gs-max-val').textContent = tgt + 10;
        document.getElementById('fly-gs').innerText = Math.round(curGS);
        let rotation = (curGS - tgt) * 9; 
        rotation = Math.max(-95, Math.min(95, rotation)); 
        document.getElementById('needle-ptr').setAttribute('transform', `rotate(${rotation}, 100, 100)`);
    }

    function toggleGPS() {
        let btn = document.getElementById('gps-btn');
        if (watchID) {
            navigator.geolocation.clearWatch(watchID); watchID = null;
            btn.innerText = "GPS OFF"; btn.style.background = "#f00";
        } else {
            watchID = navigator.geolocation.watchPosition(p => {
                curGS = (p.coords.speed || 0) * 1.94384;
                btn.innerText = "GPS LIVE"; btn.style.background = "#0f0";
            }, null, { enableHighAccuracy: true });
        }
    }

    const gsS = document.getElementById('gs-target-select');
    for(let i=0; i<=30; i++) { 
        let o = document.createElement('option'); o.value = i; o.innerText = i; 
        if(i===18) o.selected=true; 
        gsS.appendChild(o); 
    }
    updateWB();
</script>
</body>
</html>
